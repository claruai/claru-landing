name: Weekly Dataset Digest

on:
  schedule:
    - cron: "0 8 * * 1" # Monday 8am UTC
  workflow_dispatch: {}

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/dataset-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/dataset-pipeline/requirements.txt

      - name: Generate and send digest
        working-directory: scripts/dataset-pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_DIGEST_SEGMENT_ID: ${{ secrets.RESEND_DIGEST_SEGMENT_ID }}
        run: python weekly_digest.py

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: scripts/dataset-pipeline/output/digests/
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"Weekly digest failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          else
            echo "::warning::Digest failed. Set SLACK_WEBHOOK_URL for alerts."
          fi

name: Dataset Pipeline

on:
  schedule:
    # Run daily at 6am UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      skip_push:
        description: "Skip Supabase push (dry run)"
        type: boolean
        default: false

concurrency:
  group: dataset-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/dataset-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/dataset-pipeline/requirements.txt

      - name: Crawl HuggingFace
        working-directory: scripts/dataset-pipeline
        run: |
          mkdir -p output
          python crawl_hf.py --limit 300 --output output/hf_robotics_raw_v2.json

      - name: Extract metadata
        working-directory: scripts/dataset-pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python extract_metadata.py --input output/hf_robotics_raw_v2.json --output output/enriched_v2.json

      - name: Social signals
        working-directory: scripts/dataset-pipeline
        run: python social_signals.py --input output/enriched_v2.json --output output/enriched_with_social.json

      - name: QA scoring
        working-directory: scripts/dataset-pipeline
        run: python qa_score.py --input output/enriched_with_social.json

      - name: Push to Supabase
        if: ${{ !inputs.skip_push }}
        working-directory: scripts/dataset-pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python push_to_supabase.py

      - name: Revalidate pages
        if: ${{ !inputs.skip_push }}
        env:
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          SITE_URL: https://claru.ai
        run: |
          echo "Revalidating /datasets hub page..."
          curl -sf -X POST "$SITE_URL/api/revalidate" \
            -H "Content-Type: application/json" \
            -H "x-revalidation-secret: $REVALIDATION_SECRET" \
            -d '{"path": "/datasets"}' || echo "Warning: hub revalidation failed"

          echo "Revalidating /sitemap.xml..."
          curl -sf -X POST "$SITE_URL/api/revalidate" \
            -H "Content-Type: application/json" \
            -H "x-revalidation-secret: $REVALIDATION_SECRET" \
            -d '{"path": "/sitemap.xml"}' || echo "Warning: sitemap revalidation failed"

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            scripts/dataset-pipeline/output/enriched_with_social.json
            scripts/dataset-pipeline/output/qa_report.md
            scripts/dataset-pipeline/output/dataset_report_v2.md
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"Dataset pipeline failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          else
            echo "::warning::Pipeline failed. Set SLACK_WEBHOOK_URL secret to enable Slack alerts."
          fi
